<div class="buttons">

    <app-number [displayNumbers]="['7', '8', '9']" (numberClicked)="onNumber($event)"></app-number>
    <app-operators [displayOperators]="['/']" (operatorClicked)="onOperator($event)"></app-operators>


    <app-number [displayNumbers]="['4', '5', '6']" (numberClicked)="onNumber($event)"></app-number>
    <app-operators [displayOperators]="['*']" (operatorClicked)="onOperator($event)"></app-operators>


    <app-number [displayNumbers]="['1', '2', '3']" (numberClicked)="onNumber($event)"></app-number>
    <app-operators [displayOperators]="['-']" (operatorClicked)="onOperator($event)"></app-operators>


    <app-number [displayNumbers]="['0']" (numberClicked)="onNumber($event)"></app-number>
    <app-operators [displayOperators]="['C', '=', '+']" (operatorClicked)="onOperator($event)"></app-operators>
</div>
